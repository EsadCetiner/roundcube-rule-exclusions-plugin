---
meta:
  author: "Esad Cetiner"
  description: "Roundcube Rule Exclusions Plugin: Old rule-exclusions for false positives that no longer exist"
rule_id: 9519999
tests:
  - test_id: 1
    desc: Substring false postive for cookie value and names matching command names
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: Roundcube rule exclusions plugin
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            Cookie: roundcube_sessid=dfjsdia80f; roundcube_sessauth=dfjsdia80f; identviewsplitter=foo
          port: 80
          method: GET
          uri: /get?_task=mail&_mbox=INBOX
        output:
          log:
            no_expect_ids: [932236]
  - test_id: 2
    desc: Substring false postive for CSRF token value and names matching command names
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: Roundcube rule exclusions plugin
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          port: 80
          method: POST
          uri: /post
          data: |-
            _token=lsrandom&_task=login&_action=login&_timezone=Australia%2FSydney&_url=empty&_user=postmaster%40example.com&_pass=%3Cscript%3E
          version: HTTP/1.1
        output:
          log:
            no_expect_ids: [932236]
  - test_id: 3
    desc: Substring false postive, matching `id` in identities
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: Roundcube rule exclusions plugin
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          port: 80
          method: POST
          uri: /post?_action=identities
          version: HTTP/1.1
        output:
          log:
            no_expect_ids: [932236]
